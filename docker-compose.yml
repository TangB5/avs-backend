version: '3.9'

services:
  # ── API Node.js ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: production
    container_name: avs-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV:     production
      PORT:         4000
      DATABASE_URL: postgresql://avs_user:avs_password@postgres:5432/avs_db
      JWT_SECRET:   ${JWT_SECRET:-changeme_use_real_secret_in_prod}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - avs-network
    volumes:
      - ./logs:/app/logs

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: avs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     avs_user
      POSTGRES_PASSWORD: avs_password
      POSTGRES_DB:       avs_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U avs_user -d avs_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - avs-network

  # ── Redis (cache + rate limiting) ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: avs-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-avs_redis_pass}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - avs-network

  # ── Adminer (DB GUI — dev seulement) ────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: avs-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - avs-network
    profiles:
      - dev

volumes:
  postgres_data:
  redis_data:

networks:
  avs-network:
    driver: bridge
